<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#121826" />
    <title>Sign in — AppBeg Ledger</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="login-page">
    <main class="login-shell">
      <section class="login-card card">
        <div class="login-brand">AppBeg Ledger</div>
        <p class="login-subtitle">Sign in to access the operations center.</p>
        <form id="loginForm" class="login-form">
          <label class="field-label">
            Username
            <input id="loginUsername" name="username" type="text" autocomplete="username" required />
          </label>
          <label class="field-label">
            Password
            <input id="loginPassword" name="password" type="password" autocomplete="current-password" required />
          </label>
          <div id="loginError" class="settings-error login-error" hidden></div>
          <button type="submit" class="button primary login-submit" id="loginSubmit">Sign in</button>
        </form>
      </section>
    </main>
    <script type="module">
      const form = document.querySelector('#loginForm');
      const errorEl = document.querySelector('#loginError');
      const submitBtn = document.querySelector('#loginSubmit');

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        errorEl.hidden = true;
        submitBtn.disabled = true;
        submitBtn.textContent = 'Signing in…';

        try {
          const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({
              username: document.querySelector('#loginUsername').value,
              password: document.querySelector('#loginPassword').value
            })
          });
          const data = await response.json().catch(() => ({}));
          if (!response.ok) {
            throw new Error(data.error || 'Invalid username or password');
          }
          window.location.href = '/';
        } catch (error) {
          errorEl.textContent = error.message || 'Invalid username or password';
          errorEl.hidden = false;
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Sign in';
        }
      });
    </script>
  </body>
</html>
